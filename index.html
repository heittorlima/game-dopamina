<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dale um ⚡️</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

.container {
    padding: 20px;
}

h1 {
    text-align: center;
    color: #8b5cf6;
}

.top-card {
    background: #1e293b;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 20px;
}

.points {
    font-size: 28px;
    font-weight: bold;
}

.progress-bar {
    height: 14px;
    background: #334155;
    border-radius: 8px;
    margin-top: 10px;
    overflow: hidden;
}

.progress {
    height: 100%;
    width: 0%;
    background: #8b5cf6;
    transition: width 0.4s ease;
}

.section-title {
    margin-top: 25px;
    margin-bottom: 10px;
    font-weight: bold;
    color: #cbd5e1;
}

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 12px;
    transition: transform 0.2s ease;
}

.card.completed {
    opacity: 0.6;
    transform: scale(0.98);
}

button {
    padding: 10px;
    border: none;
    border-radius: 8px;
    margin-top: 8px;
    background: #8b5cf6;
    color: white;
    font-weight: bold;
}

button:disabled {
    background: #475569;
}

input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    margin-bottom: 8px;
    background: #334155;
    color: white;
}

.reward-locked {
    opacity: 0.5;
}

.reward-unlocked {
    border: 2px solid #10b981;
}
</style>
</head>

<body>
<div class="container">

<h1>Dale um ⚡️</h1>

<div class="top-card">
    <div class="points">⚡ <span id="points">0</span> pontos</div>
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>
    <small>Progresso até 5000 pontos</small>
</div>

<div class="section-title">Nova Tarefa</div>

<input id="taskName" placeholder="Nome da tarefa">
<input id="taskPoints" type="number" placeholder="Pontuação">

<button onclick="addTask()">Adicionar Tarefa</button>

<div class="section-title">Tarefas</div>
<div id="taskList"></div>

<div class="section-title">Recompensa Especial</div>
<div id="rewardCard" class="card reward-locked">
    <strong>🏆 Recompensa Especial</strong>
    <p>Custo: 5000 pontos</p>
    <button id="buyBtn" onclick="buyReward()" disabled>Comprar</button>
</div>

</div>

<audio id="taskSound">
<source src="data:audio/mp3;base64,//uQZAAAAAAAAAAAAAAAAAAAA..." type="audio/mp3">
</audio>

<script>
let points = parseInt(localStorage.getItem("points")) || 0;
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

const pointsEl = document.getElementById("points");
const progressEl = document.getElementById("progress");
const taskList = document.getElementById("taskList");
const buyBtn = document.getElementById("buyBtn");
const rewardCard = document.getElementById("rewardCard");
const taskSound = document.getElementById("taskSound");

function save() {
    localStorage.setItem("points", points);
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function updateUI() {
    pointsEl.innerText = points;

    let percent = Math.min((points / 5000) * 100, 100);
    progressEl.style.width = percent + "%";

    if (points >= 5000) {
        buyBtn.disabled = false;
        rewardCard.classList.remove("reward-locked");
        rewardCard.classList.add("reward-unlocked");
    } else {
        buyBtn.disabled = true;
        rewardCard.classList.remove("reward-unlocked");
        rewardCard.classList.add("reward-locked");
    }

    renderTasks();
}

function addTask() {
    const name = document.getElementById("taskName").value;
    const pts = parseInt(document.getElementById("taskPoints").value);

    if (!name || !pts) return;

    tasks.push({ name, pts, completed: false });
    save();
    updateUI();

    document.getElementById("taskName").value = "";
    document.getElementById("taskPoints").value = "";
}

function renderTasks() {
    taskList.innerHTML = "";

    tasks.forEach((task, index) => {
        const div = document.createElement("div");
        div.className = "card" + (task.completed ? " completed" : "");

        div.innerHTML = `
            <strong>${task.name}</strong>
            <p>${task.pts} pontos</p>
            <button ${task.completed ? "disabled" : ""} onclick="completeTask(${index})">
                ${task.completed ? "Concluída" : "Concluir"}
            </button>
        `;

        taskList.appendChild(div);
    });
}

function completeTask(index) {
    if (tasks[index].completed) return;

    tasks[index].completed = true;
    points += tasks[index].pts;

    taskSound.play();

    save();
    updateUI();
}

function buyReward() {
    if (points < 5000) return;

    points -= 5000;
    alert("🏆 Recompensa Especial desbloqueada!");

    save();
    updateUI();
}

updateUI();
</script>

</body>
</html>
