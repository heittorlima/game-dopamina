<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game Dopamina</title>
<style>
body { font-family: Arial; text-align: center; padding: 20px; }
button { padding: 10px 20px; margin: 5px; }
#timer { font-size: 32px; margin: 20px; }
</style>
</head>
<body>

<h2>Game Dopamina</h2>

<p>Pontos: <span id="points">0</span></p>
<p>Tarefas na semana: <span id="weekly">0</span></p>
<p>Status ⚡️: <span id="status">Bloqueado</span></p>

<input id="task" placeholder="Qual tarefa?" /><br><br>
<input id="reward" placeholder="Qual recompensa?" /><br><br>
<<input id="minutes" type="number" placeholder="Minutos" min="0" />
<input id="seconds" type="number" placeholder="Segundos" min="0" max="59" /><br><br>

<button onclick="startTimer()">COMEÇAR</button>
<button id="finishBtn" onclick="finishTask()" disabled>FINALIZAR</button>

<div id="timer">00:00</div>
<div id="response"></div>

<script>

const API_KEY = "AIzaSyC3yuYHEI7KV-45yeiLCOefR4l66A-lyI0";

// --------- INICIALIZAÇÃO ---------

let points = parseInt(localStorage.getItem("points")) || 0;
let weeklyTasks = parseInt(localStorage.getItem("weeklyTasks")) || 0;

document.getElementById("points").innerText = points;
document.getElementById("weekly").innerText = weeklyTasks;

let timeLeft = 0;
let timerInterval = null;

// --------- TIMER ---------

function startTimer() {

    let minutes = parseInt(document.getElementById("minutes").value) || 0;
    let seconds = parseInt(document.getElementById("seconds").value) || 0;

    timeLeft = (minutes * 60) + seconds;

    if (timeLeft <= 0) {
        alert("Digite um tempo válido.");
        return;
    }

    updateTimer();

    document.getElementById("finishBtn").disabled = true;

    if (timerInterval) clearInterval(timerInterval);

    timerInterval = setInterval(() => {
        if (timeLeft > 0) {
            timeLeft--;
            updateTimer();
        } else {
            clearInterval(timerInterval);
            timerInterval = null;

            document.getElementById("finishBtn").disabled = false;

            finishTask();
        }
    }, 1000);
}

// --------- FINALIZAÇÃO ---------

async function finishTask() {
    
    if (timeLeft > 0) {
    alert("O tempo ainda não terminou.");
    return;
}

    if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
    }

    let task = document.getElementById("task").value.trim();
    let reward = document.getElementById("reward").value.trim();

    if (!task) {
        alert("Descreva a tarefa.");
        return;
    }

    const prompt = `
O usuário disse que fez a tarefa: "${task}".
Analise se parece uma tarefa produtiva real.
Responda apenas:
APROVADO
ou
REPROVADO
`;

    const response = await fetch(
        "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + API_KEY,
        {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }]
            })
        }
    );

    const data = await response.json();
    const text = data.candidates[0].content.parts[0].text.trim();

    if (text.includes("APROVADO")) {

        points++;
        weeklyTasks++;

        localStorage.setItem("points", points);
        localStorage.setItem("weeklyTasks", weeklyTasks);

        document.getElementById("points").innerText = points;
        document.getElementById("weekly").innerText = weeklyTasks;

        document.getElementById("response").innerText =
            "✅ Tarefa validada! Recompensa liberada: " + reward;

    } else {
        document.getElementById("response").innerText =
            "❌ Tarefa não validada.";
    }
}

</script>

</body>
</html>
