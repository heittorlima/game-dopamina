<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema Operacional Pessoal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; background:#f4f6f8; padding:20px; max-width:1000px; margin:auto;}
.section { background:white; padding:15px; border-radius:10px; margin-bottom:20px; box-shadow:0 2px 6px rgba(0,0,0,0.05);}
button { padding:6px 12px; margin-top:5px; cursor:pointer; }
input, select { padding:6px; margin:4px 0; width:100%; }
.progress-bar { height:18px; background:#ddd; border-radius:10px; overflow:hidden; }
.progress-fill { height:100%; background:#4caf50; width:0%; transition:0.3s; }
.small { font-size:13px; color:#666; }
.hidden { display:none; }
.toggle { float:right; }
.energy { font-weight:bold; }
.task { border-bottom:1px solid #eee; padding:8px 0; }
</style>
</head>
<body>

<h2>Sistema Operacional Pessoal</h2>
<button class="toggle" onclick="toggleMode()">Alternar Modo</button>

<!-- MODO SIMPLES -->
<div id="simpleMode">

<div class="section">
<b>Saldo:</b> <span id="currentPoints"></span> |
<b>Nível:</b> <span id="level"></span>
<br><br>
Energia Hoje: <span class="energy" id="energy"></span>/10
<br><br>
Progresso até Especial (5000)
<div class="progress-bar">
<div class="progress-fill" id="progressFill"></div>
</div>
<span class="small" id="progressText"></span>
</div>

<div class="section">
<h3>Tarefas de Hoje</h3>
<div id="todayTasks"></div>
</div>

</div>

<!-- MODO ANÁLISE -->
<div id="analysisMode" class="hidden">

<div class="section">
<b>Total Histórico:</b> <span id="totalPoints"></span><br>
<b>Especial Comprada:</b> <span id="specialCount"></span> vezes<br>
<b>Tarefas Concluídas na Semana:</b> <span id="weeklyCompleted"></span>
</div>

<div class="section">
<h3>Adicionar Tarefa</h3>
<input id="taskName" placeholder="Nome">
<select id="taskPoints">
<option value="10">Muito Fácil (10)</option>
<option value="25">Fácil (25)</option>
<option value="75">Média (75)</option>
<option value="150">Difícil (150)</option>
<option value="300">Muito Difícil (300)</option>
</select>

<select id="taskEnergy">
<option value="1">Energia 1</option>
<option value="2">Energia 2</option>
<option value="3">Energia 3</option>
<option value="4">Energia 4</option>
<option value="5">Energia 5</option>
</select>

<select id="taskCategory"></select>

<select id="taskDay">
<option value="1">Segunda</option>
<option value="2">Terça</option>
<option value="3">Quarta</option>
<option value="4">Quinta</option>
<option value="5">Sexta</option>
<option value="6">Sábado</option>
<option value="0">Domingo</option>
</select>

<button onclick="addTask()">Adicionar</button>

<h4>Nova Categoria</h4>
<input id="newCategory" placeholder="Nome da categoria">
<button onclick="addCategory()">Adicionar Categoria</button>

</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("sopData")) || {
currentPoints: 0,
totalPointsEarned: 0,
energyToday: 10,
lastEnergyReset: null,
tasks: [],
categories: ["Estudo","Corpo","Casa","Social","Projeto","Organização"],
specialCount: 0,
history: []
};

function save() {
localStorage.setItem("sopData", JSON.stringify(data));
}

function getWeekStart() {
let now = new Date();
let day = now.getDay();
let diff = now.getDate() - day + (day === 0 ? -6 : 1);
return new Date(now.setDate(diff));
}

function resetEnergyIfNeeded() {
let today = new Date().toDateString();
if (data.lastEnergyReset !== today) {
data.energyToday = 10;
data.lastEnergyReset = today;
}
}

function updateUI() {
resetEnergyIfNeeded();

document.getElementById("currentPoints").innerText = data.currentPoints;
document.getElementById("totalPoints").innerText = data.totalPointsEarned;
document.getElementById("level").innerText = Math.floor(data.totalPointsEarned/1000)+1;
document.getElementById("specialCount").innerText = data.specialCount;
document.getElementById("energy").innerText = data.energyToday;

let progress = Math.min((data.currentPoints/5000)*100,100);
document.getElementById("progressFill").style.width = progress+"%";

document.getElementById("progressText").innerText =
data.currentPoints>=5000 ? "Especial disponível!" :
(5000-data.currentPoints)+" pontos restantes";

renderTodayTasks();
renderCategories();
renderWeeklyStats();
save();
}

function renderCategories() {
let select = document.getElementById("taskCategory");
select.innerHTML="";
data.categories.forEach(cat=>{
select.innerHTML+=`<option>${cat}</option>`;
});
}

function addCategory() {
let name = document.getElementById("newCategory").value.trim();
if(!name) return;
data.categories.push(name);
document.getElementById("newCategory").value="";
updateUI();
}

function addTask() {
let name = document.getElementById("taskName").value.trim();
let pts = parseInt(document.getElementById("taskPoints").value);
let energy = parseInt(document.getElementById("taskEnergy").value);
let category = document.getElementById("taskCategory").value;
let day = parseInt(document.getElementById("taskDay").value);

if(!name) return;

data.tasks.push({
id: Date.now(),
name, pts, energy,
category, day,
completed:false
});

document.getElementById("taskName").value="";
updateUI();
}

function renderTodayTasks() {
let today = new Date().getDay();
let container = document.getElementById("todayTasks");
container.innerHTML="";

data.tasks.filter(t=>t.day===today && !t.completed)
.forEach(task=>{
container.innerHTML+=`
<div class="task">
<b>${task.name}</b>
(${task.pts} pts | energia ${task.energy})
<br>
<button onclick="completeTask(${task.id})">Concluir</button>
</div>`;
});
}

function completeTask(id) {
let task = data.tasks.find(t=>t.id===id);
if(!task) return;

if(data.energyToday < task.energy){
alert("Energia insuficiente hoje.");
return;
}

task.completed=true;
data.energyToday -= task.energy;
data.currentPoints += task.pts;
data.totalPointsEarned += task.pts;
data.history.push({name:task.name, pts:task.pts, date:new Date()});

updateUI();
}

function renderWeeklyStats() {
let weekStart = getWeekStart();
let count = data.history.filter(h=>new Date(h.date)>=weekStart).length;
document.getElementById("weeklyCompleted").innerText = count;
}

function toggleMode(){
document.getElementById("simpleMode").classList.toggle("hidden");
document.getElementById("analysisMode").classList.toggle("hidden");
}

updateUI();
</script>

</body>
</html>
