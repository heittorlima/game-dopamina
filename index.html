<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game Dopamina</title>
<style>
body { font-family: Arial; text-align: center; padding: 20px; }
button { padding: 10px 20px; margin: 5px; }
#timer { font-size: 32px; margin: 20px; }
</style>
</head>
<body>

<h2>Game Dopamina</h2>

<p>Pontos: <span id="points">0</span></p>

<input id="task" placeholder="Qual tarefa?" /><br><br>
<input id="reward" placeholder="Qual recompensa?" /><br><br>
<input id="minutes" type="number" placeholder="Minutos" /><br><br>

<button onclick="startTimer()">COMEÇAR</button>
<button onclick="finishTask()">FINALIZAR</button>

<div id="timer">00:00</div>
<div id="response"></div>

<script>

const API_KEY = "AIzaSyC3yuYHEI7KV-45yeiLCOefR4l66A-lyI0";
let points = localStorage.getItem("points") || 0;
document.getElementById("points").innerText = points;

let timeLeft = 0;
let timerInterval;

function startTimer() {
    let minutes = document.getElementById("minutes").value;
    timeLeft = minutes * 60;
    updateTimer();

    timerInterval = setInterval(() => {
        timeLeft--;
        updateTimer();
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
        }
    }, 1000);
}

function updateTimer() {
    let m = Math.floor(timeLeft / 60);
    let s = timeLeft % 60;
    document.getElementById("timer").innerText =
        String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');
}

async function finishTask() {

    clearInterval(timerInterval);

    let task = document.getElementById("task").value;
    let reward = document.getElementById("reward").value;

    const prompt = `
O usuário disse que fez a tarefa: "${task}".
Analise se parece uma tarefa produtiva real.
Responda apenas:
APROVADO
ou
REPROVADO
`;

    const response = await fetch(
        "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + API_KEY,
        {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }]
            })
        }
    );

    const data = await response.json();
    const text = data.candidates[0].content.parts[0].text.trim();

    if (text.includes("APROVADO")) {
        points++;
        localStorage.setItem("points", points);
        document.getElementById("points").innerText = points;
        document.getElementById("response").innerText =
            "✅ Tarefa validada! Recompensa liberada: " + reward;
    } else {
        document.getElementById("response").innerText =
            "❌ Tarefa não validada.";
    }
}

</script>

</body>
</html>
